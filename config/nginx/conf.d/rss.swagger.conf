# Reverse-proxy FastAPI Swagger / ReDoc / OpenAPI to the `web` container.
# Included from /etc/nginx/nginx.conf; served under https://rss.navydev.top.

location = /docs {
    proxy_pass http://web:8000/docs;
    include /etc/nginx/proxy_params.conf;
}

location = /redoc {
    proxy_pass http://web:8000/redoc;
    include /etc/nginx/proxy_params.conf;
}

location = /openapi.json {
    proxy_pass http://web:8000/openapi.json;
    include /etc/nginx/proxy_params.conf;
}
